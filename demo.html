<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MONTHLIV - 팝업 삽입 예시</title>
<style>
  body{ font-family: -apple-system, sans-serif; max-width:640px; margin:60px auto; padding:0 20px; color:#1B1D1B; }
  .cta-btn{
    appearance:none; border:none; background:#0F6F64; color:#fff;
    padding:14px 22px; border-radius:12px; font-size:15px; font-weight:700;
    cursor:pointer;
  }
</style>
</head>
<body>

<h1>먼슬리브 예시 페이지</h1>
<p>아래 버튼을 누르면 환불 예정 금액 계산기가 팝업으로 뜹니다. 이 버튼을 실제 웹사이트의 원하는 위치(퇴실 안내 페이지, 계약서 페이지 등)에 그대로 붙여넣으시면 됩니다.</p>

<button class="cta-btn" data-refund-calc-trigger>환불 예정 금액 미리 계산해보기</button>

<!-- 이 한 줄만 페이지에 추가하면 팝업 기능이 활성화됩니다 -->
<script src="embed.js"></script>

</body>
</html>
